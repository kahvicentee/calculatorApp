<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/images/favicon-32x32.png" type="img/png">
    <title>Calculator App | Frontend Mentor</title>
    
    <link rel="stylesheet" href="styles/style.css">
    <script src="javascript/themes.js" defer></script>
    <script src="javascript/main.js" defer></script>

    <!--Font (Google Fonts)-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=League+Spartan:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main id="calculator">
        <div id="header">
            <div id="title">
                <h2>calc</h2>
            </div>

            <div id="themes">
                <div class="themes-nums">
                    <p id="one">1</p>
                    <p id="two">2</p>
                    <p id="three">3</p>
                </div>
                <div class="button-change">
                    <p>THEME</p>
                    <div class="change-mode" id="change-mode">
                        <div class="circle" id="circle"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="result">
            <h1></h1>
        </div>

        <div id="buttons">
            <button class="num">7</button>
            <button class="num">8</button>
            <button class="num">9</button>
            <button class="del">DEL</button>
            <button class="num">4</button>
            <button class="num">5</button>
            <button class="num">6</button>
            <button class="op">+</button>
            <button class="num">1</button>
            <button class="num">2</button>
            <button class="num">3</button>
            <button class="op">-</button>
            <button class="num">.</button>
            <button class="num">0</button>
            <button class="op">/</button>
            <button class="op">x</button>
            <button class="reset">RESET</button>
            <button class="result">=</button>
        </div>
    </main>
    <footer class="attribution">
        <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.</p>
        <p>Coded by <a href="https://github.com/kahvicentee" target="_blank">Karina Vicente</a>.</p>
    </footer>
</body>
</html>
